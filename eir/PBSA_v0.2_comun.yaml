# =============================================================================
# EIR NEXUM PBSA v0.2 · COMÚN · Requisitos OBLIGATORIOS base
# =============================================================================
# Versión: 0.2
# Variante: comun (base heredable por _diseno, _contratista, _asbuilt)
# Derivado de: PBSA_v0.1_obligatorias.yaml (archivado en eir/_archive/)
# Sesión creación: S5·X (10/06/2026) · refactor DF-01
# Activo de referencia: PBSA (Purpose-Built Student Accommodation)
#
# Propósito
# ---------
# Este fichero contiene los 15 chequeos OBLIGATORIOS comunes a TODOS los EIR
# del programa PBSA, independientemente de la variante contractual:
#   - 2 structural_checks (MVD ReferenceView + bSDD classification)
#   - 8 loin_checks H3 (Proyecto Ejecutivo · CTE DB-SI / DB-HE / EST)
#   - 5 loin_checks H4 (As-built / Entrega · FM básico)
#
# Las variantes (_diseno, _contratista, _asbuilt) AÑADEN chequeos específicos
# del rol contractual mediante merge en tiempo de carga (s4s_audit_eir.py).
# El bloque 'meta' de la variante prevalece sobre este al hacer merge.
#
# Merge contract (implementado en s4s_audit_eir.py)
# -------------------------------------------------
# - structural_checks = comun.structural_checks + variant.structural_checks
# - loin_checks       = comun.loin_checks       + variant.loin_checks
# - meta              = {**comun.meta, **variant.meta}  (variant wins)
# - check_id colisionado entre comun y variant → ValueError (fail-fast)
# =============================================================================

meta:
  eir_version: "0.2"
  variant: "comun"
  asset_type: "PBSA"
  hitos_in_scope: ["H3", "H4"]
  hitos_out_of_scope: ["H1", "H2"]
  source_doc: "docs/EIR_NEXUM_PBSA_v0.1.md"
  derived_from: "PBSA_v0.1_obligatorias.yaml"
  created_in_session: "S5·X"
  created_at: "2026-06-10"

  thresholds:
    pass_min_pct: 95.0
    partial_min_pct: 60.0

  # ---------------------------------------------------------------------------
  # Refactors pendientes
  # ---------------------------------------------------------------------------
  pending_refactors: []

  # ---------------------------------------------------------------------------
  # Cierre DF-01 (referencia histórica)
  # ---------------------------------------------------------------------------
  closed_refactors:
    - id: "DF-01"
      title: "Variantes contractuales del EIR"
      raised_in_session: "S5·L"
      closed_in_session: "S5·X"
      closed_at: "2026-06-10"
      resolution: >
        Refactor completado. v0.2 introduce 4 ficheros (_comun + 3 variantes:
        _diseno, _contratista, _asbuilt). El auditor s4s_audit_eir.py soporta
        --variant con merge automático y mantiene compatibilidad con --eir legacy.

# -----------------------------------------------------------------------------
# Verificaciones estructurales COMUNES (modelo completo)
# -----------------------------------------------------------------------------
structural_checks:

  - check_id: "STR.MVD.ReferenceView"
    hito: "H3"
    category: "structural"
    eir_ref: "§3.1"
    severity: "obligatorio"
    rationale: "MVD Reference View en cabecera STEP garantiza interoperabilidad y compatibilidad con herramientas downstream (CDE, IDS validators)."
    check_fn: "check_mvd_compliance"
    params:
      expected_mvd_substr: "ReferenceView"

  - check_id: "STR.BSDD.Classification"
    hito: "H3"
    category: "structural"
    eir_ref: "§3.1.6"
    severity: "obligatorio"
    rationale: "Toda IfcClassificationReference.Location debe ser URI bSDD válida (bsdd.buildingsmart.org, identifier.buildingsmart.org o gubimclass.itec.cat)."
    check_fn: "check_bsdd_classification"
    params: {}

# -----------------------------------------------------------------------------
# Verificaciones LOIN COMUNES
# -----------------------------------------------------------------------------
loin_checks:

  # ===========================================================================
  # H3 · Proyecto Ejecutivo (8 chequeos heredados de v0.1)
  # ===========================================================================

  - check_id: "H3.WALL.ThermalTransmittance"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Cumplimiento CTE DB-HE: transmitancia térmica del cerramiento opaco."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "ThermalTransmittance"
    check_fn: "query_missing_property"

  - check_id: "H3.WALL.FireRating"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Cumplimiento CTE DB-SI: resistencia al fuego de la compartimentación."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "FireRating"
    check_fn: "query_missing_property"

  - check_id: "H3.WALL.LoadBearing"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.EST"
    severity: "obligatorio"
    rationale: "Diferenciación estructural vs no estructural para análisis EST y QTO."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "LoadBearing"
    check_fn: "query_missing_property"

  - check_id: "H3.WALL.IsExternal"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Distinción envolvente vs interior para cálculo CTE DB-HE y BREEAM."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "IsExternal"
    check_fn: "query_missing_property"

  - check_id: "H3.SLAB.FireRating"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Compartimentación horizontal CTE DB-SI."
    ifc_type: "IfcSlab"
    pset: "Pset_SlabCommon"
    prop: "FireRating"
    check_fn: "query_missing_property"

  - check_id: "H3.SLAB.LoadBearing"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.EST"
    severity: "obligatorio"
    rationale: "Identificación de losas estructurales para análisis EST."
    ifc_type: "IfcSlab"
    pset: "Pset_SlabCommon"
    prop: "LoadBearing"
    check_fn: "query_missing_property"

  - check_id: "H3.DOOR.FireRating"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Puertas EI obligatorias en sectorización CTE DB-SI."
    ifc_type: "IfcDoor"
    pset: "Pset_DoorCommon"
    prop: "FireRating"
    check_fn: "query_missing_property"

  - check_id: "H3.WINDOW.IsExternal"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Ventanas en envolvente para cálculo CTE DB-HE y BREEAM Energy."
    ifc_type: "IfcWindow"
    pset: "Pset_WindowCommon"
    prop: "IsExternal"
    check_fn: "query_missing_property"

  # ===========================================================================
  # H4 · As-built / Entrega (5 chequeos heredados de v0.1 · FM básico)
  # ===========================================================================

  - check_id: "H4.SPACE.GrossPlannedArea"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Superficie útil por unidad para gestión PBSA (rent-roll, ratio €/m²)."
    ifc_type: "IfcSpace"
    pset: "Pset_SpaceCommon"
    prop: "GrossPlannedArea"
    check_fn: "query_missing_property"

  - check_id: "H4.SPACE.IsExternal"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Diferenciación espacios climatizados vs exteriores para FM y costes operativos."
    ifc_type: "IfcSpace"
    pset: "Pset_SpaceCommon"
    prop: "IsExternal"
    check_fn: "query_missing_property"

  - check_id: "H4.STOREY.EntranceLevel"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Identificación planta de acceso para señalética, evacuación y wayfinding."
    ifc_type: "IfcBuildingStorey"
    pset: "Pset_BuildingStoreyCommon"
    prop: "EntranceLevel"
    check_fn: "query_missing_property"

  - check_id: "H4.BUILDING.YearOfConstruction"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Año de construcción para mantenimiento, ciclo de vida y reporting SFDR."
    ifc_type: "IfcBuilding"
    pset: "Pset_BuildingCommon"
    prop: "YearOfConstruction"
    check_fn: "query_missing_property"

  - check_id: "H4.BUILDING.NumberOfStoreys"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Nº de plantas para registros patrimoniales, seguros y FM."
    ifc_type: "IfcBuilding"
    pset: "Pset_BuildingCommon"
    prop: "NumberOfStoreys"
    check_fn: "query_missing_property"

# =============================================================================
# Quality Engine v2 checks (S6·X · nuevo motor modular)
# =============================================================================
# Sección NUEVA introducida en S6·X. Convive con structural_checks/loin_checks
# (legacy s4s_audit_eir.py) sin conflicto.
#
# Diferencias vs legacy:
#   - check_id sigue convención C-<DIM>-<NN> del checklist E6.
#   - Cada check declara explícitamente: dimension (D1-D8), layer (grafica/
#     no_grafica/documentacion), backend (yaml_python | ids_xml), check_fn
#     (Python dotted path o referencia IDS), params.
#   - Variantes (_diseno, _contratista, _asbuilt) pueden añadir bloques propios
#     bajo la misma clave 'quality_engine_checks:' y se mergean por concatenación
#     (mismo contrato que structural_checks/loin_checks).
#   - check_id colisionado entre comun y variant → CheckIdCollisionError.
#
# Las funciones referenciadas en check_fn están en quality_engine.rules.d*_*
# y se invocan vía whitelist explícita en quality_engine.core.runner.
# =============================================================================

quality_engine_checks:

  # ---------------------------------------------------------------------------
  # D1 · Modelo (integridad estructural · capa no gráfica)
  # ---------------------------------------------------------------------------

  - check_id: "C-M-01"
    dimension: "D1"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d1_modelo:check_file_schema_ifc4"
    params:
      expected_schema: "IFC4"
    eir_ref: "§3.1"
    rationale: "FILE_SCHEMA en cabecera STEP debe ser IFC4 (no IFC2X3). Es la base de interoperabilidad y precondición para todos los Psets canónicos."

  - check_id: "C-M-02"
    dimension: "D1"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d1_modelo:check_model_schema_coherence"
    params:
      expected_schema: "IFC4"
    eir_ref: "§3.1"
    rationale: "model.schema reportado por ifcopenshell debe coincidir con FILE_SCHEMA declarado. Detecta ficheros corruptos o reescritos con metadata incoherente."

  # ---------------------------------------------------------------------------
  # D3 · Relaciones (capa no gráfica)
  # ---------------------------------------------------------------------------

  - check_id: "C-R-01"
    dimension: "D3"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d3_relaciones:check_containment_to_storey"
    params:
      target_types:
        - "IfcWall"
        - "IfcSlab"
        - "IfcDoor"
        - "IfcWindow"
        - "IfcColumn"
        - "IfcBeam"
    eir_ref: "§3.3"
    rationale: "Todo IfcProduct físico debe estar contenido en un IfcBuildingStorey vía IfcRelContainedInSpatialStructure. Sin containment no es navegable en visores ni FM."

  - check_id: "C-R-02"
    dimension: "D3"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d3_relaciones:check_spatial_hierarchy"
    params: {}
    eir_ref: "§3.3"
    rationale: "Jerarquía IfcProject → IfcSite → IfcBuilding → IfcBuildingStorey vía IfcRelAggregates debe ser completa. Ruptura impide navegación CDE y federación."

  - check_id: "C-R-03"
    dimension: "D3"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d3_relaciones:check_no_orphans"
    params:
      target_types:
        - "IfcWall"
        - "IfcSlab"
        - "IfcDoor"
        - "IfcWindow"
        - "IfcColumn"
        - "IfcBeam"
    eir_ref: "§3.3"
    rationale: "Productos físicos sin containment ni agregación son huérfanos: no aparecen en ningún storey, invisibles en visores y excluidos de QTO/FM."

  # ---------------------------------------------------------------------------
  # D5 · Unidades (capa no gráfica)
  # ---------------------------------------------------------------------------

  - check_id: "C-U-01"
    dimension: "D5"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d5_unidades:check_unit_assignment_present"
    params: {}
    eir_ref: "§3.5"
    rationale: "El modelo debe declarar al menos un IfcUnitAssignment para que las propiedades numéricas sean interpretables. Sin él, todo valor numérico es ambiguo."

  - check_id: "C-U-02"
    dimension: "D5"
    layer: "no_grafica"
    hito: "H3"
    severity: "obligatorio"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d5_unidades:check_si_metric_system"
    params:
      required_units:
        LENGTHUNIT: "METRE"
        AREAUNIT: "SQUARE_METRE"
        VOLUMEUNIT: "CUBIC_METRE"
    eir_ref: "§3.5"
    rationale: "Sistema métrico SI obligatorio en proyecto español. Detecta modelos importados de regiones imperiales o con configuración inconsistente entre tipos."

  - check_id: "C-U-03"
    dimension: "D5"
    layer: "no_grafica"
    hito: "H3"
    severity: "recomendado"
    backend: "yaml_python"
    check_fn: "quality_engine.rules.d5_unidades:sniff_length_coherence"
    params:
      sample_types:
        - "IfcWall"
        - "IfcSlab"
      expected_range_m:
        min: 0.05
        max: 100.0
      sample_size: 20
    eir_ref: "§3.5"
    rationale: "Sniff numérico: muestrea longitudes/dimensiones de muros y losas. Si la mediana cae fuera del rango plausible (5cm-100m) es señal de unidades mal interpretadas (p.ej. mm declarado como m, factor 1000)."
