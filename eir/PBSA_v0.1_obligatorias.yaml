# =============================================================================
# EIR NEXUM PBSA v0.1 · Requisitos OBLIGATORIOS (representación máquina-leíble)
# =============================================================================
# Versión: 0.1
# Sesión origen: S2·S (EIR draft inicial) + S4·X (formalización Obligatorias)
# Sesión ejecución: S4·S Bloque B (cierre E4)
# Activo de referencia: PBSA (Purpose-Built Student Accommodation)
# Modelo objetivo: AC20-FZK-Haus.ifc (proxy de prueba antes de modelo PBSA real)
#
# Alcance v0.1
# ------------
# - Solo requisitos clasificados como OBLIGATORIOS en el EIR §4.
# - Hitos cubiertos: H3 (Proyecto Ejecutivo) + H4 (As-built / Entrega).
#   H1 y H2 quedan fuera del scope v0.1 (se incorporarán en v0.2 en S5·L).
# - Las propiedades RECOMENDADAS y los BIM Uses U1-U5 se documentarán
#   en eir/PBSA_v0.1_recomendadas.yaml (futuro entregable).
#
# Estructura
# ----------
# meta              · metadatos del EIR (versión, hitos cubiertos, activo)
# structural_checks · verificaciones a nivel modelo completo (MVD, bSDD)
# loin_checks       · requisitos LOIN por hito (15 propiedades obligatorias)
#
# Cada check declara:
#   check_id     · identificador único (HX.TYPE.PROP)
#   hito         · H1..H4
#   category     · structural | loin
#   eir_ref      · cita textual al EIR (§sección)
#   severity     · obligatorio (siempre en este YAML)
#   rationale    · 1 línea explicando por qué es obligatorio para PBSA
#   ifc_type     · clase IFC a inspeccionar (solo loin)
#   pset         · Property Set a auditar (solo loin)
#   prop         · propiedad concreta (solo loin)
#   check_fn     · función Python a invocar (orquestador resuelve dinámicamente)
#   params       · parámetros adicionales (solo structural)
#
# Política de umbrales (aplica a loin_checks)
# -------------------------------------------
#   pass     : compliance_pct >= 95
#   partial  : 60 <= compliance_pct < 95
#   fail     : compliance_pct < 60
#
# Los structural_checks usan su propio campo 'compliance' devuelto por la función
# (pass | partial | fail), no se aplican estos umbrales.
# =============================================================================

meta:
  eir_version: "0.1"
  asset_type: "PBSA"
  hitos_in_scope: ["H3", "H4"]
  hitos_out_of_scope: ["H1", "H2"]
  source_doc: "docs/EIR_NEXUM_PBSA_v0.1.md"
  thresholds:
    pass_min_pct: 95.0
    partial_min_pct: 60.0

# -----------------------------------------------------------------------------
# Verificaciones estructurales (modelo completo)
# -----------------------------------------------------------------------------
structural_checks:

  - check_id: "STR.MVD.ReferenceView"
    hito: "H3"
    category: "structural"
    eir_ref: "§3.1"
    severity: "obligatorio"
    rationale: "MVD Reference View en cabecera STEP garantiza interoperabilidad y compatibilidad con herramientas downstream (CDE, IDS validators)."
    check_fn: "check_mvd_compliance"
    params:
      expected_mvd_substr: "ReferenceView"

  - check_id: "STR.BSDD.Classification"
    hito: "H3"
    category: "structural"
    eir_ref: "§3.1.6"
    severity: "obligatorio"
    rationale: "Toda IfcClassificationReference.Location debe ser URI bSDD válida (bsdd.buildingsmart.org, identifier.buildingsmart.org o gubimclass.itec.cat)."
    check_fn: "check_bsdd_classification"
    params: {}

# -----------------------------------------------------------------------------
# Verificaciones LOIN (Level of Information Need por propiedad)
# -----------------------------------------------------------------------------
loin_checks:

  # ===========================================================================
  # H3 · Proyecto Ejecutivo (8 chequeos)
  # ===========================================================================

  - check_id: "H3.WALL.ThermalTransmittance"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Cumplimiento CTE DB-HE: transmitancia térmica del cerramiento opaco."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "ThermalTransmittance"
    check_fn: "query_missing_property"

  - check_id: "H3.WALL.FireRating"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Cumplimiento CTE DB-SI: resistencia al fuego de la compartimentación."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "FireRating"
    check_fn: "query_missing_property"

  - check_id: "H3.WALL.LoadBearing"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.EST"
    severity: "obligatorio"
    rationale: "Diferenciación estructural vs no estructural para análisis EST y QTO."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "LoadBearing"
    check_fn: "query_missing_property"

  - check_id: "H3.WALL.IsExternal"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Distinción envolvente vs interior para cálculo CTE DB-HE y BREEAM."
    ifc_type: "IfcWallStandardCase"
    pset: "Pset_WallCommon"
    prop: "IsExternal"
    check_fn: "query_missing_property"

  - check_id: "H3.SLAB.FireRating"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Compartimentación horizontal CTE DB-SI."
    ifc_type: "IfcSlab"
    pset: "Pset_SlabCommon"
    prop: "FireRating"
    check_fn: "query_missing_property"

  - check_id: "H3.SLAB.LoadBearing"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.EST"
    severity: "obligatorio"
    rationale: "Identificación de losas estructurales para análisis EST."
    ifc_type: "IfcSlab"
    pset: "Pset_SlabCommon"
    prop: "LoadBearing"
    check_fn: "query_missing_property"

  - check_id: "H3.DOOR.FireRating"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Puertas EI obligatorias en sectorización CTE DB-SI."
    ifc_type: "IfcDoor"
    pset: "Pset_DoorCommon"
    prop: "FireRating"
    check_fn: "query_missing_property"

  - check_id: "H3.WINDOW.IsExternal"
    hito: "H3"
    category: "loin"
    eir_ref: "§4.2.ARQ"
    severity: "obligatorio"
    rationale: "Ventanas en envolvente para cálculo CTE DB-HE y BREEAM Energy."
    ifc_type: "IfcWindow"
    pset: "Pset_WindowCommon"
    prop: "IsExternal"
    check_fn: "query_missing_property"

  # ===========================================================================
  # H4 · As-built / Entrega (5 chequeos · operación PBSA)
  # ===========================================================================

  - check_id: "H4.SPACE.GrossPlannedArea"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Superficie útil por unidad para gestión PBSA (rent-roll, ratio €/m²)."
    ifc_type: "IfcSpace"
    pset: "Pset_SpaceCommon"
    prop: "GrossPlannedArea"
    check_fn: "query_missing_property"

  - check_id: "H4.SPACE.IsExternal"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Diferenciación espacios climatizados vs exteriores para FM y costes operativos."
    ifc_type: "IfcSpace"
    pset: "Pset_SpaceCommon"
    prop: "IsExternal"
    check_fn: "query_missing_property"

  - check_id: "H4.STOREY.EntranceLevel"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Identificación planta de acceso para señalética, evacuación y wayfinding."
    ifc_type: "IfcBuildingStorey"
    pset: "Pset_BuildingStoreyCommon"
    prop: "EntranceLevel"
    check_fn: "query_missing_property"

  - check_id: "H4.BUILDING.YearOfConstruction"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Año de construcción para mantenimiento, ciclo de vida y reporting SFDR."
    ifc_type: "IfcBuilding"
    pset: "Pset_BuildingCommon"
    prop: "YearOfConstruction"
    check_fn: "query_missing_property"

  - check_id: "H4.BUILDING.NumberOfStoreys"
    hito: "H4"
    category: "loin"
    eir_ref: "§4.4.FM"
    severity: "obligatorio"
    rationale: "Nº de plantas para registros patrimoniales, seguros y FM."
    ifc_type: "IfcBuilding"
    pset: "Pset_BuildingCommon"
    prop: "NumberOfStoreys"
    check_fn: "query_missing_property"
